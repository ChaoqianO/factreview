- id: cleanup
  cwd: '{paper_root}'
  cmd:
  - python
  - -c
  - "import shutil; from pathlib import Path; p=Path('.');\nfor d in ['checkpoints','log','data']:\n  shutil.rmtree(p/d, ignore_errors=True)\n(p/'checkpoints').mkdir(parents=True, exist_ok=True)\n(p/'log').mkdir(parents=True, exist_ok=True)\n(p/'data').mkdir(parents=True, exist_ok=True)\nprint('ok')\n"
  timeout_sec: 600
  enabled: true

- id: extract_data
  cwd: '{paper_root}'
  cmd:
  - python
  - -c
  - "import zipfile; from pathlib import Path; p=Path('.'); (p/'data').mkdir(parents=True, exist_ok=True);\nfor z in ['FB15k-237.zip','WN18RR.zip']:\n  zp=p/'data_compressed'/z\n  with zipfile.ZipFile(str(zp),'r') as f: f.extractall(str(p/'data'))\nprint('extracted')\n"
  timeout_sec: 1200
  enabled: true

- id: repo_smoke
  cwd: '{paper_root}'
  cmd:
  - python
  - run.py
  - --help
  timeout_sec: 600
  enabled: true

# =====================
# FB15k-237 experiments
# =====================
- id: train_fb_transe_sub
  cwd: '{paper_root}'
  cmd: [python, run.py, -name, fb_transe_sub, -data, FB15k-237, -score_func, transe, -opn, sub, -gamma, '9', -hid_drop, '0.1', -init_dim, '200', -gpu, '-1', -num_workers, '0']
  timeout_sec: 21600
  enabled: true
- id: eval_fb_transe_sub
  cwd: '{paper_root}'
  cmd: [python, codeeval_eval_ckpt.py, --prefix, fb_transe_sub, --out, '{run_dir}/artifacts/metrics/fb_transe_sub.json', --split, test]
  timeout_sec: 1800
  enabled: true

