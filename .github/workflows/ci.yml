name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Ruff format (check)
        run: ruff format --check .
      - name: Mypy (core modules)
        run: mypy src/factreview/schemas src/factreview/util || true   # incremental; warn only

  test-unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,llm,positioning,execution]"
      - name: Pytest (unit, fast)
        run: pytest tests/unit -m "not slow and not e2e and not requires_docker and not requires_llm and not requires_mineru" --cov=factreview --cov-report=term-missing
