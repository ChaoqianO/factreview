- id: smoke_help
  enabled: true
  cwd: '{paper_root}'
  cmd:
  - python
  - run.py
  - -h
  timeout_sec: 600
  use_conda: true
  artifact_paths: []
- id: prepare_data
  enabled: true
  cwd: '{paper_root}'
  cmd:
  - bash
  - -lc
  - if [ -f setup.sh ]; then bash setup.sh; elif [ -f preprocess.sh ]; then bash preprocess.sh;
    else echo 'No setup/preprocess script found; assuming data is already prepared.';
    fi
  timeout_sec: 1200
  use_conda: true
  artifact_paths:
  - data/**
  - data_compressed/**
  - log/**
- id: train_transe_sub_fb15k237
  enabled: true
  cwd: '{paper_root}'
  cmd:
  - python
  - run.py
  - -name
  - transe_sub_fb15k237
  - -data
  - FB15k-237
  - -score_func
  - transe
  - -opn
  - sub
  - -gamma
  - '9'
  - -hid_drop
  - '0.1'
  - -init_dim
  - '200'
  timeout_sec: 86400
  use_conda: true
  artifact_paths:
  - checkpoints/**
  - log/**
