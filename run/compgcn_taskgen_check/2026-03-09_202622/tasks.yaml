- id: smoke_help
  enabled: true
  cwd: '{paper_root}'
  cmd:
  - python
  - run.py
  - -h
  timeout_sec: 300
  use_conda: true
  artifact_paths: []
- id: install_deps
  enabled: false
  cwd: '{paper_root}'
  cmd:
  - python
  - -m
  - pip
  - install
  - -r
  - requirements.txt
  timeout_sec: 1200
  use_conda: true
  artifact_paths: []
- id: setup_data
  enabled: true
  cwd: '{paper_root}'
  cmd:
  - bash
  - preprocess.sh
  timeout_sec: 1200
  use_conda: true
  artifact_paths:
  - data/**
- id: train_transe_sub
  enabled: true
  cwd: '{paper_root}'
  cmd:
  - python
  - run.py
  - -name
  - transe_sub
  - -score_func
  - transe
  - -opn
  - sub
  - -gamma
  - '9'
  - -hid_drop
  - '0.1'
  - -init_dim
  - '200'
  timeout_sec: 86400
  use_conda: true
  artifact_paths:
  - checkpoints/**
  - log/**
- id: train_transe_mult
