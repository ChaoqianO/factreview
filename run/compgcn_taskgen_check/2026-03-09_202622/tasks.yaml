- id: eval_transe_sub
  enabled: true
  cwd: '{paper_root}'
  cmd:
  - python
  - codeeval_eval_ckpt.py
  - --ckpt-dir
  - ./checkpoints
  - --prefix
  - transe_sub
  - --out
  - ./metrics/train_transe_sub_test.json
  - --split
  - test
  timeout_sec: 1800
  use_conda: true
  artifact_paths:
  - metrics/train_transe_sub_test.json
